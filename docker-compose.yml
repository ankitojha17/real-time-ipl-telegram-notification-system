version: "3.9"

services:

  web:
    build: .

    container_name: ipl_notification_web

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    depends_on:
      - db

  db:
    image: postgres:16

    container_name: ipl_notification_db

    restart: always

    environment:
      POSTGRES_DB: ipl_notification_system_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: